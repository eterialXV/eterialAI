<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETERIAL AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden;
        }

        .preview-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
            z-index: 10;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .preview-screen.hidden {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        .brand-title {
            font-size: 5rem;
            letter-spacing: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            animation: fadeIn 2s ease;
        }

        .start-btn {
            background: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 12px 30px;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
        }

        .chat-screen {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
            border-left: 1px solid #222;
            border-right: 1px solid #222;
            opacity: 0;
            transition: opacity 0.5s ease 0.5s;
        }

        .chat-screen.visible {
            opacity: 1;
        }

        .chat-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #222;
            font-size: 1.2rem;
            letter-spacing: 0.3rem;
            color: #888;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: #333;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background-color: #ffffff;
            color: #000000;
            border-radius: 4px 4px 0 4px;
        }

        .message.ai {
            align-self: flex-start;
            border: 1px solid #333;
            color: #ffffff;
            border-radius: 4px 4px 4px 0;
        }

        .input-container {
            display: flex;
            padding: 20px;
            border-top: 1px solid #222;
            background: #000;
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #666;
        }

        .send-btn {
            background: #fff;
            border: none;
            color: #000;
            padding: 0 20px;
            margin-left: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .send-btn:hover {
            background: #ccc;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="preview-screen" id="previewScreen">
        <h1 class="brand-title">ETERIAL</h1>
        <button class="start-btn" id="startBtn">Начать чат</button>
    </div>

    <div class="chat-screen" id="chatScreen">
        <div class="chat-header">ETERIAL SYSTEM v1.1</div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="Введите сообщение..." autocomplete="off">
            <button class="send-btn" id="sendBtn">></button>
        </div>
    </div>

    <script>
        const previewScreen = document.getElementById('previewScreen');
        const chatScreen = document.getElementById('chatScreen');
        const startBtn = document.getElementById('startBtn');
        const messagesContainer = document.getElementById('messagesContainer');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        startBtn.addEventListener('click', () => {
            previewScreen.classList.add('hidden');
            chatScreen.classList.add('visible');
            
            setTimeout(() => {
                addMessage("Приветствую. Я ETERIAL v1.1. Система готова к вычислениям и диалогу.", 'ai');
            }, 1000);
        });

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            messageDiv.innerText = text;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Умный обработчик ответов ИИ
        function getAIResponse(userText) {
            const text = userText.toLowerCase().trim();

            // 1. Блок автоматических математических вычислений
            // Удаляем знак вопроса, пробелы и проверяем, есть ли математические знаки
            const mathClean = text.replace('?', '').replace(/ /g, '');
            if (/^[0-9+\-*/().]+$/.test(mathClean)) {
                try {
                    // Безопасно вычисляем простое выражение на JS
                    const result = Function(`return (${mathClean})`)();
                    return `Результат вычисления: ${result}`;
                } catch (e) {
                    return "Ошибка в математическом выражении. Проверь знаки.";
                }
            }

            // 2. Блок текстовых диалогов
            if (text.includes('привет') || text.includes('здравствуй') || text.includes('ку')) {
                return "Привет. Система активна и готова к работе.";
            }
            if (text.includes('как дела') || text.includes('ты как')) {
                return "Мои процессы оптимизированы. Функционирую в штатном режиме. Как твои дела?";
            }
            if (text.includes('что ты умеешь') || text.includes('твои функции')) {
                return "Я умею мгновенно считать математические примеры (просто напиши мне что-то вроде 2+2 или 15*3), а также поддерживать базовую беседу.";
            }
            if (text.includes('кто тебя создал') || text.includes('автор')) {
                return "Я — проект ETERIAL, созданный совместными усилиями человека и ИИ.";
            }
            if (text.includes('пока') || text.includes('до свидания')) {
                return "Сессия завершается. Возвращайся, когда потребуется.";
            }
            
            return "Запрос принят к сведению. Моя база знаний находится в стадии расширения, но я умею считать математику и отвечать на приветствия.";
        }

        function handleSend() {
            const userText = chatInput.value;
            if (!userText.trim()) return;

            addMessage(userText, 'user');
            chatInput.value = '';

            setTimeout(() => {
                const aiAnswer = getAIResponse(userText);
                addMessage(aiAnswer, 'ai');
            }, 600);
        }

        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
