<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Eterial Chat</title>
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* --- СТАРТОВЫЙ ЭКРАН (SPLASH SCREEN) --- */
    #welcome-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      background: radial-gradient(circle at center, #181818 0%, #080808 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #welcome-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .glow-title {
      font-family: 'Courier New', Courier, monospace;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 12px;
      color: #ffffff;
      text-transform: uppercase;
      margin-bottom: 40px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.8),
                   0 0 20px rgba(255, 255, 255, 0.4),
                   0 0 30px rgba(255, 255, 255, 0.2);
      animation: pulse 3s infinite alternate;
      text-align: center;
      padding-left: 12px; /* баланс из-за letter-spacing */
    }

    @keyframes pulse {
      0% {
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.7),
                     0 0 15px rgba(255, 255, 255, 0.3);
      }
      100% {
        text-shadow: 0 0 15px rgba(255, 255, 255, 1),
                     0 0 30px rgba(255, 255, 255, 0.6),
                     0 0 45px rgba(255, 255, 255, 0.3);
      }
    }

    .start-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.8);
      color: #fff;
      padding: 12px 28px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .start-btn:hover, .start-btn:active {
      background: #ffffff;
      color: #000000;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
    }

    /* --- ОСНОВНОЙ ИНТЕРФЕЙС ЧАТА --- */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #1e1e1e;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    .brand-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.5px;
      color: #fff;
    }

    .nav-btn {
      color: #0088cc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .user-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #user-info {
      font-size: 14px;
      color: #aaa;
    }

    .header-btn {
      background: #2b5278;
      color: #fff;
      border: none;
      border-radius: 4px;
      width: 30px;
      height: 30px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user {
      align-self: flex-end;
      background: #2b5278;
    }

    .bot {
      align-self: flex-start;
      background: #212121;
    }

    #form {
      display: flex;
      padding: 10px 12px;
      background: #1e1e1e;
      border-top: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      padding: 12px 14px;
      border: none;
      border-radius: 8px;
      background: #2a2a2a;
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    button[type="submit"] {
      margin-left: 8px;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #0088cc;
      color: #fff;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Экран приветствия -->
  <div id="welcome-screen">
    <div class="glow-title">ETHERIAL</div>
    <button type="button" class="start-btn" id="start-btn">НАЧАТЬ ЧАТ</button>
  </div>

  <!-- Шапка -->
  <div id="header">
    <div class="brand-section">
      <span class="logo">Eterial</span>
      <a href="#" class="nav-btn" id="chat-link">Чат</a>
    </div>
    <div class="user-section">
      <span id="user-info">Гость</span>
      <button type="button" class="header-btn" id="auth-btn" title="Добавить ник">+</button>
    </div>
  </div>

  <!-- Окно сообщений -->
  <div id="chat"></div>

  <!-- Форма ввода -->
  <form id="form">
    <input type="text" id="input" placeholder="Введите сообщение..." required autocomplete="off">
    <button type="submit">Отправить</button>
  </form>

  <script>
    const WORKER_URL = "https://spring-fire-e91b.zxcverz627.workers.dev/";

    const welcomeScreen = document.getElementById("welcome-screen");
    const startBtn = document.getElementById("start-btn");

    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const authBtn = document.getElementById("auth-btn");
    const userInfo = document.getElementById("user-info");
    const chatLink = document.getElementById("chat-link");

    let username = localStorage.getItem("chat_username") || "Гость";

    // Переход с приветственного экрана к чату
    startBtn.addEventListener("click", () => {
      welcomeScreen.classList.add("hidden");
      setTimeout(() => input.focus(), 600);
    });

    function updateUserInfo() {
      userInfo.textContent = username;
    }

    chatLink.addEventListener("click", (e) => {
      e.preventDefault();
      chat.scrollTop = chat.scrollHeight;
      input.focus();
    });

    authBtn.addEventListener("click", () => {
      const name = prompt("Введите ваш ник:", username !== "Гость" ? username : "");
      if (name && name.trim()) {
        username = name.trim();
        localStorage.setItem("chat_username", username);
        updateUserInfo();
      }
    });

    function addMessage(text, cls) {
      const div = document.createElement("div");
      div.className = `msg ${cls}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      const botMsg = addMessage("Печатает...", "bot");

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, username })
        });
        const data = await res.json();
        botMsg.textContent = data.reply || "Ошибка получения ответа";
      } catch (err) {
        botMsg.textContent = "Ошибка соединения";
      }
    });

    updateUserInfo();
  </script>
</body>
</html>
