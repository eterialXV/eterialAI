<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Eterial Chat</title>
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      background: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #welcome-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      background: #000000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #welcome-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .glow-title {
      font-family: 'Courier New', Courier, monospace;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 12px;
      color: #ffffff;
      text-transform: uppercase;
      margin-bottom: 40px;
      text-shadow: 0 0 10px #ffffff,
                   0 0 20px #ffffff,
                   0 0 40px rgba(255, 255, 255, 0.6);
      animation: neonPulse 2s infinite alternate;
      text-align: center;
      padding-left: 12px;
    }

    @keyframes neonPulse {
      0% {
        text-shadow: 0 0 8px #ffffff, 0 0 15px rgba(255, 255, 255, 0.5);
      }
      100% {
        text-shadow: 0 0 15px #ffffff, 0 0 30px #ffffff, 0 0 50px rgba(255, 255, 255, 0.8);
      }
    }

    .start-btn {
      background: transparent;
      border: 1px solid #ffffff;
      color: #ffffff;
      padding: 12px 28px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease;
    }

    .start-btn:hover, .start-btn:active {
      background: #ffffff;
      color: #000000;
      box-shadow: 0 0 20px #ffffff;
    }

    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #050505;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 2px 10px rgba(255, 255, 255, 0.05);
      flex-shrink: 0;
    }

    .brand-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 2px;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
    }

    .nav-btn {
      color: #888888;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    .nav-btn:hover {
      color: #ffffff;
      text-shadow: 0 0 5px #ffffff;
    }

    .user-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #user-info {
      font-size: 13px;
      color: #888;
      letter-spacing: 1px;
    }

    .header-btn {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 4px;
      width: 30px;
      height: 30px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
      transition: all 0.2s ease;
    }

    .header-btn:hover {
      border-color: #ffffff;
      box-shadow: 0 0 10px #ffffff;
      background: #ffffff;
      color: #000000;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #000000;
    }

    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 10px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
    }

    .user {
      align-self: flex-end;
      background: #111111;
      color: #ffffff;
      border: 1px solid #ffffff;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    .bot {
      align-self: flex-start;
      background: #050505;
      color: #cccccc;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 5px rgba(255, 255, 255, 0.1);
    }

    #form {
      display: flex;
      padding: 10px 12px;
      background: #050505;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      background: #0a0a0a;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    #input:focus {
      border-color: #ffffff;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
    }

    button[type="submit"] {
      margin-left: 8px;
      padding: 12px 16px;
      border: 1px solid #ffffff;
      border-radius: 8px;
      background: transparent;
      color: #fff;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
      transition: all 0.2s ease;
    }

    button[type="submit"]:hover, button[type="submit"]:active {
      background: #ffffff;
      color: #000000;
      box-shadow: 0 0 15px #ffffff;
    }
  </style>
</head>
<body>

  <div id="welcome-screen">
    <div class="glow-title">ETERIAL</div>
    <button type="button" class="start-btn" id="start-btn">НАЧАТЬ ЧАТ</button>
  </div>

  <div id="header">
    <div class="brand-section">
      <span class="logo">Eterial</span>
      <a href="#" class="nav-btn" id="chat-link">Чат</a>
    </div>
    <div class="user-section">
      <span id="user-info">Гость</span>
      <button type="button" class="header-btn" id="auth-btn">+</button>
    </div>
  </div>

  <div id="chat"></div>

  <form id="form">
    <input type="text" id="input" required autocomplete="off">
    <button type="submit">Отправить</button>
  </form>

  <script>
    const WORKER_URL = "https://spring-fire-e91b.zxcverz627.workers.dev/";

    const welcomeScreen = document.getElementById("welcome-screen");
    const startBtn = document.getElementById("start-btn");

    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const authBtn = document.getElementById("auth-btn");
    const userInfo = document.getElementById("user-info");
    const chatLink = document.getElementById("chat-link");

    let username = localStorage.getItem("chat_username") || "Гость";

    startBtn.addEventListener("click", () => {
      welcomeScreen.classList.add("hidden");
      setTimeout(() => input.focus(), 600);
    });

    function updateUserInfo() {
      userInfo.textContent = username;
    }

    chatLink.addEventListener("click", (e) => {
      e.preventDefault();
      chat.scrollTop = chat.scrollHeight;
      input.focus();
    });

    authBtn.addEventListener("click", () => {
      const name = prompt("", username !== "Гость" ? username : "");
      if (name && name.trim()) {
        username = name.trim();
        localStorage.setItem("chat_username", username);
        updateUserInfo();
      }
    });

    function addMessage(text, cls) {
      const div = document.createElement("div");
      div.className = `msg ${cls}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      const botMsg = addMessage("...", "bot");

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, username })
        });
        const data = await res.json();
        botMsg.textContent = data.reply || "Ошибка получения ответа";
      } catch (err) {
        botMsg.textContent = "Ошибка соединения";
      }
    });

    updateUserInfo();
  </script>
</body>
</html>
