<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <style>
    body {
      font-family: sans-serif;
      background: #121212;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #121212;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s;
    }
    #loader.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .arevakhach {
      width: 80px;
      height: 80px;
      animation: spin 2s linear infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 8px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .user {
      align-self: flex-end;
      background: #2b5278;
    }
    .bot {
      align-self: flex-start;
      background: #212121;
    }
    #form {
      display: flex;
      padding: 10px;
      background: #1e1e1e;
    }
    #input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: #2a2a2a;
      color: #fff;
      outline: none;
    }
    button {
      margin-left: 8px;
      padding: 12px 18px;
      border: none;
      border-radius: 6px;
      background: #0088cc;
      color: #fff;
      cursor: pointer;
    }
    #clear-btn {
      background: #4a2525;
    }
  </style>
</head>
<body>

  <div id="loader">
    <svg class="arevakhach" viewBox="0 0 100 100" fill="none" stroke="#0088cc" stroke-width="4" stroke-linecap="round">
      <circle cx="50" cy="50" r="8" fill="#0088cc" />
      <path d="M 50 42 A 20 20 0 0 1 70 50" />
      <path d="M 58 50 A 20 20 0 0 1 50 70" />
      <path d="M 50 58 A 20 20 0 0 1 30 50" />
      <path d="M 42 50 A 20 20 0 0 1 50 30" />
      <path d="M 50 30 A 35 35 0 0 1 85 50" />
      <path d="M 70 50 A 35 35 0 0 1 50 85" />
      <path d="M 50 70 A 35 35 0 0 1 15 50" />
      <path d="M 30 50 A 35 35 0 0 1 50 15" />
    </svg>
  </div>

  <div id="chat"></div>

  <form id="form">
    <button type="button" id="clear-btn" title="Очистить историю">✕</button>
    <input type="text" id="input" placeholder="Введите сообщение..." required autocomplete="off">
    <button type="submit">Отправить</button>
  </form>

  <script>
    const WORKER_URL = "https://твой-worker.workers.dev";

    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const loader = document.getElementById("loader");
    const clearBtn = document.getElementById("clear-btn");

    let history = JSON.parse(localStorage.getItem("chat_history") || "[]");

    window.addEventListener("load", () => {
      setTimeout(() => {
        loader.classList.add("hidden");
      }, 2000);
      renderHistory();
    });

    function saveHistory() {
      localStorage.setItem("chat_history", JSON.stringify(history));
    }

    function renderHistory() {
      chat.innerHTML = "";
      history.forEach(item => {
        appendMessageUI(item.text, item.cls);
      });
    }

    function appendMessageUI(text, cls) {
      const div = document.createElement("div");
      div.className = `msg ${cls}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      appendMessageUI(text, "user");
      history.push({ text, cls: "user" });
      saveHistory();

      input.value = "";

      const botMsg = appendMessageUI("Печатает...", "bot");

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        const reply = data.reply || "Ошибка получения ответа";
        
        botMsg.textContent = reply;
        history.push({ text: reply, cls: "bot" });
        saveHistory();
      } catch (err) {
        botMsg.textContent = "Ошибка соединения";
      }
    });

    clearBtn.addEventListener("click", () => {
      history = [];
      localStorage.removeItem("chat_history");
      chat.innerHTML = "";
    });
  </script>
</body>
</html>
