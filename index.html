<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eterial Chat</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #121212;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
    }
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #1e1e1e;
      border-bottom: 1px solid #2a2a2a;
    }
    .brand-section {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .logo {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.5px;
      color: #fff;
    }
    .nav-btn {
      color: #0088cc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .nav-btn:hover {
      opacity: 0.8;
    }
    .user-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #user-info {
      font-size: 14px;
      color: #aaa;
    }
    .header-btn {
      background: #2b5278;
      color: #fff;
      border: none;
      border-radius: 4px;
      width: 32px;
      height: 32px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 8px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .user {
      align-self: flex-end;
      background: #2b5278;
    }
    .bot {
      align-self: flex-start;
      background: #212121;
    }
    #form {
      display: flex;
      padding: 10px;
      background: #1e1e1e;
    }
    #input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: #2a2a2a;
      color: #fff;
      outline: none;
    }
    button[type="submit"] {
      margin-left: 8px;
      padding: 12px 18px;
      border: none;
      border-radius: 6px;
      background: #0088cc;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="header">
    <div class="brand-section">
      <span class="logo">Eterial</span>
      <a href="#" class="nav-btn" id="chat-link">Чат</a>
    </div>
    <div class="user-section">
      <span id="user-info">Гость</span>
      <button type="button" class="header-btn" id="auth-btn" title="Добавить ник">+</button>
    </div>
  </div>

  <div id="chat"></div>

  <form id="form">
    <input type="text" id="input" placeholder="Введите сообщение..." required autocomplete="off">
    <button type="submit">Отправить</button>
  </form>

  <script>
    const WORKER_URL = "https://spring-fire-e91b.zxcverz627.workers.dev/";

    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const authBtn = document.getElementById("auth-btn");
    const userInfo = document.getElementById("user-info");
    const chatLink = document.getElementById("chat-link");

    let username = localStorage.getItem("chat_username") || "Гость";

    function updateUserInfo() {
      userInfo.textContent = username;
    }

    // Клик по надписи «Чат» фокусирует поле ввода и скроллит вниз
    chatLink.addEventListener("click", (e) => {
      e.preventDefault();
      chat.scrollTop = chat.scrollHeight;
      input.focus();
    });

    authBtn.addEventListener("click", () => {
      const name = prompt("Введите ваш ник:", username !== "Гость" ? username : "");
      if (name && name.trim()) {
        username = name.trim();
        localStorage.setItem("chat_username", username);
        updateUserInfo();
      }
    });

    function addMessage(text, cls) {
      const div = document.createElement("div");
      div.className = `msg ${cls}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      const botMsg = addMessage("Печатает...", "bot");

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, username })
        });
        const data = await res.json();
        botMsg.textContent = data.reply || "Ошибка получения ответа";
      } catch (err) {
        botMsg.textContent = "Ошибка соединения";
      }
    });

    updateUserInfo();
  </script>
</body>
</html>
