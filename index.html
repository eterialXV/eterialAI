<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETERIAL AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden;
        }

        .preview-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
            z-index: 10;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .preview-screen.hidden {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        .brand-title {
            font-size: 5rem;
            letter-spacing: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            animation: fadeIn 2s ease;
        }

        .start-btn {
            background: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 12px 30px;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
        }

        .chat-screen {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
            border-left: 1px solid #222;
            border-right: 1px solid #222;
            opacity: 0;
            transition: opacity 0.5s ease 0.5s;
        }

        .chat-screen.visible {
            opacity: 1;
        }

        .chat-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #222;
            font-size: 1.2rem;
            letter-spacing: 0.3rem;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: #333;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background-color: #ffffff;
            color: #000000;
            border-radius: 4px 4px 0 4px;
        }

        .message.ai {
            align-self: flex-start;
            border: 1px solid #333;
            color: #ffffff;
            border-radius: 4px 4px 4px 0;
        }

        .input-container {
            display: flex;
            padding: 20px;
            border-top: 1px solid #222;
            background: #000;
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #666;
        }

        .send-btn {
            background: #fff;
            border: none;
            color: #000;
            padding: 0 20px;
            margin-left: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .send-btn:hover {
            background: #ccc;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="preview-screen" id="previewScreen">
        <h1 class="brand-title">ETERIAL</h1>
        <button class="start-btn" id="startBtn">Начать чат</button>
    </div>

    <div class="chat-screen" id="chatScreen">
        <div class="chat-header">ETERIAL SYSTEM</div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="Введите сообщение..." autocomplete="off">
            <button class="send-btn" id="sendBtn">></button>
        </div>
    </div>

    <script>
        // === НАСТРОЙКА КЛЮЧА ИИ ===
        // AQ.Ab8RN6K3Zcb_7_SMcmer4MDuHrn4vOFRZpPWLGl-MaBAwEfPp
        const API_KEY = "AQ.Ab8RN6K3Zcb_7_SMcmer4MDuHrn4vOFRZpPWLGl-MaBAwEfPpA"; 

        const previewScreen = document.getElementById('previewScreen');
        const chatScreen = document.getElementById('chatScreen');
        const startBtn = document.getElementById('startBtn');
        const messagesContainer = document.getElementById('messagesContainer');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        startBtn.addEventListener('click', () => {
            previewScreen.classList.add('hidden');
            chatScreen.classList.add('visible');
            
            setTimeout(() => {
                typeEffect("Приветствую. Я ETERIAL. Мой искусственный интеллект инициализирован. Задай мне любой вопрос.", 'ai');
            }, 1000);
        });

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            messageDiv.innerText = text;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return messageDiv;
        }

        function typeEffect(text, sender) {
            const messageDiv = addMessage("", sender);
            let i = 0;
            function type() {
                if (i < text.length) {
                    messageDiv.innerText += text.charAt(i);
                    i++;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    setTimeout(type, 20);
                }
            }
            type();
        }

        // Интегрированная функция запроса к нейросети Google Gemini
        async function fetchAIResponse(userText) {
            const text = userText.toLowerCase().trim();

            // Перехват вопроса об авторе (срабатывает всегда, даже без API ключа)
            if (text.includes('создатель') || text.includes('автор') || text.includes('кто тебя создал') || text.includes('разработчик')) {
                return "Мой величайший создатель @gaferov (TELEGRAM)";
            }

            // Если ключ не настроен, выдаем подсказку
            if (API_KEY === "ПОКА_ПУСТО") {
                return "Моя нейросетевая матрица готова к работе! Но чтобы я мог свободно общаться на абсолютно любые темы, вставь бесплатный API-ключ Gemini в код сайта.";
            }

            try {
                // Прямой официальный запрос к актуальной модели Gemini 1.5 Flash
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userText }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    return data.candidates[0].content.parts[0].text;
                } else {
                    return "Получен пустой ответ от мыслительного облака. Попробуй перефразировать.";
                }
            } catch (error) {
                console.error(error);
                return "Ошибка соединения с сервером обработки мыслей. Проверь правильность API-ключа.";
            }
        }

        async function handleSend() {
            const userText = chatInput.value;
            if (!userText.trim()) return;

            addMessage(userText, 'user');
            chatInput.value = '';

            setTimeout(async () => {
                const aiAnswer = await fetchAIResponse(userText);
                typeEffect(aiAnswer, 'ai');
            }, 500);
        }

        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
